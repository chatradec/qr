<!DOCTYPE html>
<html>
<head>
<title>Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Escanear QR</h2>

<div id="reader" style="width:300px"></div>

<script>

function onScanSuccess(decodedText){
window.location = decodedText;
}

new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
).render(onScanSuccess);

</script>

</body>
</html>
